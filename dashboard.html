<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexVault — Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="js/common.js"></script>
</head>
<body class="dash-body">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container navbar__inner">
            <a href="dashboard.html" class="navbar__logo">
                <span class="logo-icon">&#128218;</span> LexVault
            </a>
            <ul class="navbar__links">
                <li><a href="books.html">Books</a></li>
                <li><a href="members.html" id="navMembers">Members</a></li>
                <li><span id="navUser" class="nav-user">—</span></li>
                <li><button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">&#127769;</button></li>
                <li><button id="logoutBtn" class="btn btn--primary">Logout</button></li>
            </ul>
        </div>
    </nav>

    <!-- Main content -->
    <main class="dash">
        <div class="container">

            <!-- Greeting -->
            <header class="dash__header">
                <h1 class="dash__title">Welcome back, <span id="greetName">User</span></h1>
                <p class="dash__sub">You are logged in as <span id="greetRole" class="role-pill">member</span></p>
            </header>

            <!-- Stats -->
            <section class="stats" id="statsGrid">
                <!-- filled by JS -->
            </section>

            <!-- Quick actions -->
            <section class="qa">
                <h2 class="dash__h2">Quick Actions</h2>
                <div class="qa__grid" id="qaGrid">
                    <!-- filled by JS -->
                </div>
            </section>

            <!-- Recent activity -->
            <section class="activity">
                <div class="page-head">
                    <h2 class="dash__h2" style="margin-bottom:0;">Recent Activity</h2>
                    <input type="text" id="searchActivity" class="search-box" placeholder="Search activity...">
                </div>
                <div class="activity__wrap">
                    <table class="activity__table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Book</th>
                                <th>Member</th>
                                <th>Action</th>
                                <th>Due Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="activityBody">
                            <!-- filled by JS -->
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </main>

    <script src="js/dashboard.js"></script>

</body>
</html>
